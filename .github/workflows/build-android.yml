name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 28
        run: |
          sdkmanager "ndk;28.2.13676358" "build-tools;34.0.0" "platforms;android-34"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Build SvelteKit
        run: npm run build

      # ── Decode keystore desde el secreto de GitHub ─────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > src-tauri/gen/android/parlet-release.jks

      # ── Firma la app en el gradle.properties ───────────────────────────────
      - name: Configure signing
        run: |
          cat >> src-tauri/gen/android/app/gradle.properties << EOF
          RELEASE_STORE_FILE=../parlet-release.jks
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          EOF

      # ── Build AAB firmado ──────────────────────────────────────────────────
      - name: Build Android AAB (release)
        run: cargo tauri android build --target aarch64

      # ── Sube el AAB como artefacto ─────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Parlet-AAB-PlayStore
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: warn
          retention-days: 60

      # ── También sube el APK arm64 para descarga directa ───────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Parlet-APK-arm64
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: warn
          retention-days: 60
